name: Renovate update dependencies
on:
  schedule:
    - cron: "0 8 * * 1-5"
      timezone: "Australia/Brisbane"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run"
        required: false
        default: true
        type: boolean

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      # Renovate authenticates with RENOVATE_GITHUB_TOKEN, not the default
      # GITHUB_TOKEN — the latter only needs read access for actions/checkout.
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          configurationFile: renovate-config.js
          token: ${{ secrets.RENOVATE_GITHUB_TOKEN }}
        env:
          RENOVATE_DRY_RUN: ${{ inputs.dry-run && 'full' || null }}
